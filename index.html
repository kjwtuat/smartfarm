<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트팜 조명 제어기 (BLE)</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; max-width: 500px; margin: 0 auto; padding: 20px; }
    h2 { text-align: center; color: #2c3e50; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .channel { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
    .channel label { width: 60px; font-weight: bold; }
    input[type=range] { flex-grow: 1; margin: 0 15px; cursor: pointer; }
    input[type=number] { width: 60px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 5px; }
    .btn { display: block; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-connect { background: #3498db; color: white; margin-bottom: 20px; }
    .btn-master { background: #2ecc71; color: white; }
    .btn-master.off { background: #e74c3c; }
    #status { text-align: center; margin-bottom: 20px; font-weight: bold; color: #7f8c8d; }
    .disabled-overlay { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>

  <h2>🌱 BLE 스마트팜 제어</h2>
  <button id="connectBtn" class="btn btn-connect" onclick="connectBLE()">블루투스 연결하기</button>
  <div id="status">현재 연결되지 않음</div>

  <div id="controlPanel" class="card disabled-overlay">
    <button id="masterBtn" class="btn btn-master off" onclick="toggleMaster()">마스터 스위치 (현재 OFF)</button>
    <p style="text-align:center; font-size:12px; color:gray;">(켜면 10분 주기 스케줄러가 작동합니다)</p>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <!-- 5채널 슬라이더 생성 -->
    <div id="sliders"></div>
  </div>

  <script>
    const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
    const CHAR_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
    let bleChar = null;
    let isMasterOn = false;

    // 채널 설정 (R, G, B, W, Y)
    const channels = [
      { id: 'R', name: 'RED', color: '#e74c3c' },
      { id: 'G', name: 'GREEN', color: '#2ecc71' },
      { id: 'B', name: 'BLUE', color: '#3498db' },
      { id: 'W', name: 'WHITE', color: '#95a5a6' },
      { id: 'Y', name: 'YELLOW', color: '#f1c40f' }
    ];

    // 슬라이더 UI 동적 생성
    const slidersDiv = document.getElementById('sliders');
    channels.forEach(ch => {
      slidersDiv.innerHTML += `
        <div class="channel" style="color: ${ch.color}">
          <label>${ch.name}</label>
          <input type="range" id="slider_${ch.id}" min="0" max="255" value="0" 
                 oninput="updateNumber('${ch.id}', this.value)" 
                 onchange="sendBLE('${ch.id}', this.value)">
          <input type="number" id="num_${ch.id}" min="0" max="255" value="0" 
                 onchange="updateSlider('${ch.id}', this.value); sendBLE('${ch.id}', this.value)">
        </div>
      `;
    });

    // 화면 숫자/슬라이더 동기화
    function updateNumber(id, val) { document.getElementById(`num_${id}`).value = val; }
    function updateSlider(id, val) { document.getElementById(`slider_${id}`).value = val; }

    // BLE 연결 프로세스
    async function connectBLE() {
      try {
        document.getElementById('status').innerText = '검색 중...';
        const device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        bleChar = await service.getCharacteristic(CHAR_UUID);
        
        document.getElementById('status').innerText = `✅ 연결됨 (${device.name})`;
        document.getElementById('status').style.color = '#27ae60';
        document.getElementById('controlPanel').classList.remove('disabled-overlay');
        document.getElementById('connectBtn').style.display = 'none';
        
      } catch (error) {
        document.getElementById('status').innerText = '연결 실패 (다시 시도하세요)';
      }
    }

    // 마스터 스위치 토글
    function toggleMaster() {
      isMasterOn = !isMasterOn;
      const btn = document.getElementById('masterBtn');
      btn.className = isMasterOn ? 'btn btn-master' : 'btn btn-master off';
      btn.innerText = isMasterOn ? '마스터 스위치 (현재 ON)' : '마스터 스위치 (현재 OFF)';
      sendBLE('M', isMasterOn ? '1' : '0');
    }

    // ESP32로 데이터 전송
    async function sendBLE(type, value) {
      if (!bleChar) return;
      const command = `${type}:${value}`; // 예: "R:255"
      try {
        const encoder = new TextEncoder();
        await bleChar.writeValue(encoder.encode(command));
      } catch (error) {
        console.error("전송 오류:", error);
      }
    }
  </script>
</body>
</html>
